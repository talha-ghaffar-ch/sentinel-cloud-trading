<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REGISTER — SENTINEL</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-box" style="max-width:460px;">
    <div class="auth-logo">
      <h1>⬡ SENTINEL</h1>
      <p>CREATE OPERATOR ACCOUNT</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}" style="margin-bottom:14px;">▸ {{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-control" value="{{ full_name or '' }}" placeholder="John Smith" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" value="{{ email or '' }}" placeholder="operator@domain.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Min 8 chars, 1 uppercase, 1 number" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-green btn-full btn-lg" style="margin-top:8px;">CREATE ACCOUNT</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Log in</a></div>
  </div>
</div>
</body>
</html>
