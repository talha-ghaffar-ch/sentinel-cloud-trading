{% extends "base.html" %}
{% block title %}{{ code }} ERROR{% endblock %}
{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;">
  <div style="font-family:var(--font-mono);font-size:80px;font-weight:700;color:var(--border-light);line-height:1;">{{ code }}</div>
  <div style="font-size:16px;color:var(--text-dim);margin:16px 0;">{{ message }}</div>
  <a href="{{ url_for('dashboard') }}" class="btn btn-outline mt-16">← RETURN TO DASHBOARD</a>
</div>
{% endblock %}
