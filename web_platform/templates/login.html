<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOGIN — SENTINEL</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>⬡ SENTINEL</h1>
      <p>CLOUD TRADING PLATFORM</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}" style="margin-bottom:14px;">▸ {{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="operator@domain.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-green btn-full btn-lg" style="margin-top:8px;">ACCESS SYSTEM</button>
    </form>
    <div class="auth-footer">
      No account? <a href="{{ url_for('register') }}">Create one</a>
    </div>
  </div>
</div>
</body>
</html>
