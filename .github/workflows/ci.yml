name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install web platform dependencies
        run: pip install -r web_platform/requirements.txt

      - name: Byte-compile all Python sources
        run: python -m compileall -q web_platform trading_engine

      - name: Lint for syntax errors and undefined names
        run: |
          pip install flake8
          flake8 web_platform trading_engine \
            --select=E9,F63,F7,F82 --show-source --statistics
